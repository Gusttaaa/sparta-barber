<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .sparta-stroke { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .sparta-fill { fill: currentColor; }
    </style>
  </defs>

  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>

  <!-- Spartan Helmet -->
  <g transform="translate(100, 85)">
    <!-- Top crest -->
    <path d="M -20 -35 L -15 -42 L 0 -45 L 15 -42 L 20 -35" class="sparta-stroke"/>

    <!-- Helmet dome -->
    <path d="M -22 -30 Q -28 -15 -28 0 L -25 8" class="sparta-stroke"/>
    <path d="M 22 -30 Q 28 -15 28 0 L 25 8" class="sparta-stroke"/>

    <!-- Center ridge -->
    <line x1="0" y1="-45" x2="0" y2="15" class="sparta-stroke"/>

    <!-- Nasal (nose guard) -->
    <path d="M -4 -8 L 0 2 L 4 -8" class="sparta-stroke"/>

    <!-- Eye guards -->
    <circle cx="-8" cy="-5" r="3.5" class="sparta-stroke"/>
    <circle cx="8" cy="-5" r="3.5" class="sparta-stroke"/>

    <!-- Cheek guards -->
    <path d="M -25 -5 Q -22 5 -18 10" class="sparta-stroke"/>
    <path d="M 25 -5 Q 22 5 18 10" class="sparta-stroke"/>

    <!-- Bottom rim -->
    <path d="M -20 10 Q -15 12 0 13 Q 15 12 20 10" class="sparta-stroke"/>
  </g>

  <!-- Shield accent below helmet -->
  <g transform="translate(100, 130)">
    <!-- Shield outline -->
    <path d="M -18 0 L -18 18 Q 0 28 18 18 L 18 0" class="sparta-stroke"/>

    <!-- Shield cross -->
    <line x1="-8" y1="6" x2="8" y2="6" class="sparta-stroke" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="18" class="sparta-stroke" stroke-width="1.5"/>
  </g>

  <!-- Decorative accent lines -->
  <line x1="50" y1="45" x2="80" y2="45" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="45" x2="150" y2="45" stroke="currentColor" stroke-width="1" opacity="0.4"/>
</svg>
