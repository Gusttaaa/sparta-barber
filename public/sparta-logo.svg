<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .sparta-helmet { fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .sparta-fill { fill: currentColor; }
    </style>
  </defs>

  <!-- Helmet top/crest -->
  <path d="M 60 80 L 70 45 L 85 35 L 100 30 L 115 35 L 130 45 L 140 80" class="sparta-helmet"/>

  <!-- Main helmet dome -->
  <path d="M 60 80 Q 50 95 50 115 L 55 135" class="sparta-helmet"/>
  <path d="M 140 80 Q 150 95 150 115 L 145 135" class="sparta-helmet"/>

  <!-- Center vertical ridge/crest line -->
  <line x1="100" y1="30" x2="100" y2="145" class="sparta-helmet"/>

  <!-- Left cheek guard -->
  <path d="M 65 85 Q 52 100 50 120" class="sparta-helmet"/>

  <!-- Right cheek guard -->
  <path d="M 135 85 Q 148 100 150 120" class="sparta-helmet"/>

  <!-- Left eye opening -->
  <path d="M 75 90 L 85 95 L 85 110 L 75 105 Z" class="sparta-helmet"/>

  <!-- Right eye opening -->
  <path d="M 125 90 L 115 95 L 115 110 L 125 105 Z" class="sparta-helmet"/>

  <!-- Nose guard (downward point) -->
  <path d="M 95 105 L 100 125 L 105 105" class="sparta-helmet"/>

  <!-- Left face protection -->
  <path d="M 55 135 Q 58 150 65 160" class="sparta-helmet"/>

  <!-- Right face protection -->
  <path d="M 145 135 Q 142 150 135 160" class="sparta-helmet"/>

  <!-- Center cross/sword design -->
  <g transform="translate(100, 100)">
    <!-- Vertical sword blade -->
    <path d="M 0 -25 L -8 -5 L -6 25 L 0 30 L 6 25 L 8 -5 Z" class="sparta-helmet"/>

    <!-- Horizontal crossguard -->
    <path d="M -18 -3 L -8 -2 L 0 0 L 8 -2 L 18 -3" class="sparta-helmet"/>
    <path d="M -18 3 L -8 2 L 0 0 L 8 2 L 18 3" class="sparta-helmet"/>
  </g>

  <!-- Helmet bottom rim -->
  <line x1="55" y1="135" x2="145" y2="135" class="sparta-helmet" stroke-width="2"/>

  <!-- Decorative side accents -->
  <path d="M 60 90 L 55 95" class="sparta-helmet"/>
  <path d="M 140 90 L 145 95" class="sparta-helmet"/>
</svg>
