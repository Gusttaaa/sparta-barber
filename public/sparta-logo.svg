<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .sparta-logo-text { font-family: 'Bebas Neue', 'Arial', sans-serif; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
      .sparta-logo-accent { fill: #B8B8B8; }
      .sparta-logo-light { fill: #D4D4D4; }
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#B8B8B8" stroke-width="1" opacity="0.3"/>

  <!-- Main scissors icon -->
  <g transform="translate(100, 70)">
    <!-- Left blade -->
    <path d="M -8 -15 Q -8 -5 0 0 Q -8 5 -8 15 Z" fill="none" stroke="#B8B8B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right blade -->
    <path d="M 8 -15 Q 8 -5 0 0 Q 8 5 8 15 Z" fill="none" stroke="#B8B8B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Center pivot -->
    <circle cx="0" cy="0" r="2" fill="#B8B8B8"/>

    <!-- Left blade shine -->
    <line x1="-6" y1="-10" x2="-4" y2="-12" stroke="#D4D4D4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Right blade shine -->
    <line x1="6" y1="-10" x2="4" y2="-12" stroke="#D4D4D4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Decorative line above -->
  <line x1="60" y1="45" x2="140" y2="45" stroke="#B8B8B8" stroke-width="1" opacity="0.4"/>

  <!-- Decorative line below -->
  <line x1="60" y1="155" x2="140" y2="155" stroke="#B8B8B8" stroke-width="1" opacity="0.4"/>

  <!-- Small accents (barber pole inspired) -->
  <circle cx="85" cy="100" r="3" fill="#B8B8B8" opacity="0.5"/>
  <circle cx="115" cy="100" r="3" fill="#B8B8B8" opacity="0.5"/>

  <!-- Text -->
  <text x="100" y="175" class="sparta-logo-text sparta-logo-accent" text-anchor="middle">SPARTA</text>
</svg>
